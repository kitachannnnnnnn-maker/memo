<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>電子黒板 メモシステム</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <!-- スムーズでカクつかないドラッグ＆ドロップを実現する SortableJS を導入 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
  <style>
    body { background-color: #fff; font-family: sans-serif; transition: all 0.3s; }
    .vertical-text { writing-mode: vertical-rl; text-orientation: upright; cursor: pointer; color: #000; }
    .section-line { border-bottom: 2px solid #334155; margin-bottom: 0.5rem; width: 100%; }
    .board-container { display: flex; flex-direction: row; justify-content: flex-start; overflow-x: hidden; height: 85vh; gap: 0.5rem; }
    .board-col { display: flex; flex-direction: column; align-items: center; border-right: 2px solid #334155; padding: 0 0.5rem; flex-grow: 1; min-width: 0; }
    .board-col.narrow { min-width: 50px; }
    @media (min-width: 640px) {
      .board-col.narrow { min-width: 70px; }
    }
    .board-col.no-border { border-right: none; }
    .vertical-container { writing-mode: vertical-rl; text-orientation: upright; display: flex; flex-direction: column; align-items: flex-start; height: 100%; min-width: 1.5rem; }
    .horizontal-container { display: flex; flex-direction: column; width: 100%; height: 100%; }
    
    /* タッチ・ホバー可能なアイテムのスタイル設定。ドラッグ可能であることを示すために手のひら(grab)カーソルを設定 */
    .editable { min-height: 1.5rem; padding: 0.25rem; border-bottom: 1px solid #f1f5f9; cursor: grab; transition: background 0.2s, opacity 0.2s; width: 100%; }
    .editable:active { cursor: grabbing; opacity: 0.6; }
    .editable:hover { background-color: #f1f5f9; }
    .edit-input { width: 100%; padding: 8px; border: 2px solid #3b82f6; border-radius: 4px; outline: none; text-align: left; font-size: inherit; }
    .zoom-btn { background: #f1f5f9; padding: 4px 16px; border-radius: 999px; font-weight: bold; }
    
    /* 縦書き要素の横幅が縮みすぎて削除ボタンで膨らまないように最小幅（1.9文字分）を確保 */
    .vertical-container .editable {
      min-width: 1.9em;
      box-sizing: border-box;
    }
    
    /* 横スクロール対応の非表示バー */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="p-4 bg-slate-50 min-h-screen" id="app-body">

  <header id="app-header" class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
    <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
        <h1 class="text-2xl font-bold text-slate-800">メモ</h1>
        <div class="flex gap-2">
          <button onclick="changeFontSize(-2)" class="zoom-btn text-slate-700 hover:bg-slate-200">A-</button>
          <button onclick="changeFontSize(2)" class="zoom-btn text-slate-700 hover:bg-slate-200">A+</button>
        </div>
    </div>
    <div class="flex flex-wrap items-center gap-2 sm:gap-4 w-full sm:w-auto justify-end">
        <div class="flex items-center gap-1 bg-slate-100 p-2 rounded-xl text-sm sm:text-base w-full sm:w-auto justify-center">
            <input type="text" id="edit-month" class="w-8 text-center bg-transparent border-b border-slate-400 font-bold focus:outline-none" placeholder="7">月
            <input type="text" id="edit-day" class="w-8 text-center bg-transparent border-b border-slate-400 font-bold focus:outline-none" placeholder="13">日
            (<input type="text" id="edit-week" class="w-6 text-center bg-transparent border-b border-slate-400 font-bold focus:outline-none" placeholder="月">)
            <button onclick="saveDate()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1 rounded-lg ml-1 font-bold text-xs sm:text-sm shadow-sm transition-colors">保存</button>
        </div>
        <button id="mode-toggle" class="bg-slate-700 hover:bg-slate-800 text-white px-6 sm:px-8 py-2.5 rounded-xl font-bold text-sm sm:text-base w-full sm:w-auto shadow-sm transition-colors">編集モード</button>
    </div>
  </header>

  <main id="board-main" class="relative">
    <!-- 表示モード -->
    <div id="view-display" class="board-container bg-white p-4 rounded-3xl shadow-lg border border-slate-100">
      <!-- 連絡 -->
      <div class="board-col">
        <div class="flex items-center gap-1 justify-center w-full">
          <h2 class="font-bold board-heading">連</h2>
          <!-- ほぼ透明で目立たない極小の「追加」ボタン -->
          <button onclick="addItem('notice')" class="opacity-15 hover:opacity-100 active:opacity-100 text-slate-400 p-1 rounded-full hover:bg-slate-100 transition-all cursor-pointer" title="連絡を追加">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
            </svg>
          </button>
        </div>
        <div class="section-line"></div>
        <div id="disp-notice" class="vertical-container"></div>
      </div>

      <!-- 宿題 -->
      <div class="board-col">
        <div class="flex items-center gap-1 justify-center w-full">
          <h2 class="font-bold board-heading">宿</h2>
          <!-- テンプレートメニューを開く「追加」ボタン -->
          <button onclick="showAddHomeworkMenu()" class="opacity-15 hover:opacity-100 active:opacity-100 text-slate-400 p-1 rounded-full hover:bg-slate-100 transition-all cursor-pointer" title="宿題の追加メニューを開く">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
            </svg>
          </button>
        </div>
        <div class="section-line"></div>
        <div id="disp-homework" class="vertical-container"></div>
      </div>

      <!-- 持ち物 -->
      <div class="board-col">
        <div class="flex items-center gap-1 justify-center w-full">
          <h2 class="font-bold board-heading">持</h2>
          <!-- ほぼ透明で目立たない極小の「追加」ボタン -->
          <button onclick="addItem('items')" class="opacity-15 hover:opacity-100 active:opacity-100 text-slate-400 p-1 rounded-full hover:bg-slate-100 transition-all cursor-pointer" title="持ち物を追加">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
            </svg>
          </button>
        </div>
        <div class="section-line"></div>
        <div id="disp-items" class="vertical-container"></div>
      </div>

      <!-- 時間割 -->
      <div class="board-col narrow">
        <div class="flex items-center gap-0.5 justify-center w-full">
          <h2 class="font-bold board-heading">時</h2>
          <!-- ほぼ透明で目立たない極小の「テンプレート反映」ボタン -->
          <button id="quick-template-btn" onclick="applyTemplateToCurrentSchedule()" class="opacity-15 hover:opacity-100 active:opacity-100 text-slate-400 p-0.5 rounded-full hover:bg-slate-100 transition-all cursor-pointer" title="時間割テンプレートを適用">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2M7 10H4V7"/>
            </svg>
          </button>
        </div>
        <div class="section-line"></div>
        <div id="disp-schedule" class="horizontal-container"></div>
      </div>

      <!-- 日付列：戻すボタンと進むボタンを上下にバランス良く追加 -->
      <div class="board-col narrow no-border flex flex-col justify-between py-2">
        <button onclick="decrementDate()" class="opacity-15 hover:opacity-100 active:opacity-100 text-slate-500 hover:text-slate-800 p-1 rounded-full hover:bg-slate-100 transition-all cursor-pointer text-xs font-bold" title="1日前にもどる">
          ▲
        </button>
        <div id="disp-date" class="vertical-text font-bold flex-grow text-center py-2 hover:opacity-70" onclick="incrementDate()"></div>
        <button onclick="incrementDate()" class="opacity-15 hover:opacity-100 active:opacity-100 text-slate-500 hover:text-slate-800 p-1 rounded-full hover:bg-slate-100 transition-all cursor-pointer text-xs font-bold" title="1日後にすすむ">
          ▼
        </button>
      </div>
    </div>

    <!-- スマホ対応・改良型編集モード -->
    <div id="view-editor" class="hidden w-full max-w-4xl mx-auto bg-white p-4 sm:p-10 rounded-3xl border shadow-xl">
      <div class="flex justify-between items-center mb-6 border-b pb-4">
        <h2 class="font-bold text-2xl sm:text-4xl text-slate-800" id="editor-title">項目編集</h2>
      </div>

      <!-- スマホでも指でスライド・タップしやすい横スクロール付きタブ -->
      <div class="flex border border-slate-200 bg-slate-50 p-1.5 rounded-2xl mb-6 overflow-x-auto whitespace-nowrap scrollbar-hide">
        <button onclick="switchEditorTab('schedule')" id="tab-schedule" class="editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm bg-white text-blue-600 shadow-sm transition-all">時間割</button>
        <button onclick="switchEditorTab('homework')" id="tab-homework" class="editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm text-slate-600 hover:text-slate-800 transition-all">宿題</button>
        <button onclick="switchEditorTab('items')" id="tab-items" class="editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm text-slate-600 hover:text-slate-800 transition-all">持ち物</button>
        <button onclick="switchEditorTab('notice')" id="tab-notice" class="editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm text-slate-600 hover:text-slate-800 transition-all">連絡</button>
        <button onclick="switchEditorTab('weekly')" id="tab-weekly" class="editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm text-indigo-600 hover:text-indigo-800 transition-all">週間テンプレート</button>
      </div>

      <!-- 編集エリアコンテンツ -->
      <div id="editor-content" class="space-y-6">
        
        <!-- 1. 時間割タブ -->
        <div id="edit-pane-schedule" class="space-y-4">
          <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-2 bg-slate-50 p-3 rounded-xl border border-slate-100">
            <div>
              <h3 class="font-bold text-lg sm:text-xl text-slate-800">今日の時間割</h3>
              <p class="text-xs text-slate-500">今日だけの特別な時間割変更も、ここで調整できます。</p>
            </div>
            <button onclick="applyTemplateToCurrentSchedule()" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2 px-3 rounded-xl border border-indigo-200 font-bold flex items-center justify-center gap-1 shadow-sm transition-colors">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2M7 10H4V7"/></svg>
              <span id="editor-template-btn-label">テンプレートを読込</span>
            </button>
          </div>
          <div id="list-schedule">
            <div class="list-container flex flex-col gap-3"></div>
            <button class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-colors" onclick="addItem('schedule')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span>＋ 項目を追加</span>
            </button>
          </div>
        </div>

        <!-- 2. 宿題タブ -->
        <div id="edit-pane-homework" class="hidden space-y-4">
          <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100 flex-wrap gap-2">
            <div class="w-full sm:w-auto">
              <h3 class="font-bold text-lg sm:text-xl text-slate-800">今日の宿題</h3>
              <p class="text-xs text-slate-500">テンプレートからすばやくきれいに宿題を設定できます。</p>
            </div>
            <div class="flex flex-wrap gap-1.5 mt-2 sm:mt-0 w-full sm:w-auto">
              <button onclick="openHomeworkModal('ganbari')" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2 px-3 rounded-xl border border-indigo-200 font-bold flex items-center gap-1 shadow-sm transition-all">
                🔥 がんばり
              </button>
              <button onclick="openHomeworkModal('ondoku')" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2 px-3 rounded-xl border border-indigo-200 font-bold flex items-center gap-1 shadow-sm transition-all">
                📖 音読
              </button>
              <button onclick="openHomeworkModal('sandori')" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2 px-3 rounded-xl border border-indigo-200 font-bold flex items-center gap-1 shadow-sm transition-all">
                📐 算ド
              </button>
              <button onclick="openHomeworkModal('kokudori')" class="text-xs bg-indigo-50 hover:bg-indigo-100 text-indigo-700 py-2 px-3 rounded-xl border border-indigo-200 font-bold flex items-center gap-1 shadow-sm transition-all">
                📝 国ド
              </button>
            </div>
          </div>
          <div id="list-homework">
            <div class="list-container flex flex-col gap-3"></div>
            <button class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-colors" onclick="addItem('homework')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span>＋ 普通の項目を追加</span>
            </button>
          </div>
        </div>

        <!-- 3. 持ち物タブ -->
        <div id="edit-pane-items" class="hidden space-y-4">
          <h3 class="font-bold text-lg sm:text-xl text-slate-800">持ち物</h3>
          <div id="list-items">
            <div class="list-container flex flex-col gap-3"></div>
            <button class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-colors" onclick="addItem('items')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span>＋ 項目を追加</span>
            </button>
          </div>
        </div>

        <!-- 4. 連絡タブ -->
        <div id="edit-pane-notice" class="hidden space-y-4">
          <h3 class="font-bold text-lg sm:text-xl text-slate-800">連絡</h3>
          <div id="list-notice">
            <div class="list-container flex flex-col gap-3"></div>
            <button class="mt-4 w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-colors" onclick="addItem('notice')">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
              <span>＋ 項目を追加</span>
            </button>
          </div>
        </div>

        <!-- 5. 一週間テンプレート設定タブ (土日を削除) -->
        <div id="edit-pane-weekly" class="hidden space-y-4">
          <div class="bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
            <h3 class="font-bold text-lg text-indigo-900 mb-1">週間時間割テンプレート設定</h3>
            <p class="text-xs text-indigo-600">各曜日の標準的な時間割を登録します。登録した内容は「読込」から今日の時間割に一発コピーできます。</p>
          </div>
          
          <!-- 曜日選択用サブタブ (土日を除外した月〜金の構成) -->
          <div class="flex gap-1.5 overflow-x-auto pb-1 scrollbar-hide border-b border-slate-100">
            <button onclick="switchTemplateDay('月')" id="temp-day-月" class="temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-sm transition-all">月</button>
            <button onclick="switchTemplateDay('火')" id="temp-day-火" class="temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">火</button>
            <button onclick="switchTemplateDay('水')" id="temp-day-水" class="temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">水</button>
            <button onclick="switchTemplateDay('木')" id="temp-day-木" class="temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">木</button>
            <button onclick="switchTemplateDay('金')" id="temp-day-金" class="temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all">金</button>
          </div>

          <!-- テンプレート内容一覧 -->
          <div id="weekly-template-container" class="flex flex-col gap-3 pt-2"></div>
          
          <button class="mt-4 w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl font-bold shadow-md flex items-center justify-center gap-2 transition-colors" onclick="addTemplateItemAction()">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            <span>＋ 時間割枠を追加</span>
          </button>
        </div>

      </div>
    </div>
  </main>

  <!-- 宿題テンプレート専用の入力モーダル -->
  <div id="homework-template-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-all duration-200">
    <div class="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 transform scale-100 transition-transform duration-200">
      <div class="flex items-center gap-3 mb-4">
        <div id="hw-modal-icon-container" class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center text-blue-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
        </div>
        <h3 class="font-bold text-lg text-slate-900" id="hw-modal-title">テンプレート追加</h3>
      </div>
      
      <!-- がんばりノート用の入力フォーム -->
      <div id="hw-form-ganbari" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">がんばりのページ数（例: 1.5, 2 など）</label>
          <input type="text" id="ganbari-page" class="w-full p-2.5 border rounded-xl text-base focus:ring-1 focus:ring-blue-500 outline-none font-bold" placeholder="1.5">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1">学習内容（例: 自学, 漢字など）</label>
          <div class="flex flex-wrap gap-1 mb-2">
            <button type="button" onclick="setGanbariContent('自学')" class="text-xs bg-slate-100 hover:bg-slate-200 py-1 px-2.5 rounded-lg font-bold text-slate-600 transition-colors">自学</button>
            <button type="button" onclick="setGanbariContent('漢字')" class="text-xs bg-slate-100 hover:bg-slate-200 py-1 px-2.5 rounded-lg font-bold text-slate-600 transition-colors">漢字</button>
            <button type="button" onclick="setGanbariContent('計算')" class="text-xs bg-slate-100 hover:bg-slate-200 py-1 px-2.5 rounded-lg font-bold text-slate-600 transition-colors">計算</button>
          </div>
          <input type="text" id="ganbari-content" class="w-full p-2.5 border rounded-xl text-base focus:ring-1 focus:ring-blue-500 outline-none font-bold" placeholder="自学">
        </div>
      </div>

      <!-- 音読用の入力フォーム -->
      <div id="hw-form-ondoku" class="hidden space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">教科（例: 国語）</label>
          <div class="flex flex-wrap gap-1 mb-2">
            <button type="button" onclick="setOndokuSubject('国語')" class="text-xs bg-slate-100 hover:bg-slate-200 py-1 px-2.5 rounded-lg font-bold text-slate-600 transition-colors">国語</button>
            <button type="button" onclick="setOndokuSubject('音読')" class="text-xs bg-slate-100 hover:bg-slate-200 py-1 px-2.5 rounded-lg font-bold text-slate-600 transition-colors">音読</button>
          </div>
          <input type="text" id="ondoku-subject" class="w-full p-2.5 border rounded-xl text-base focus:ring-1 focus:ring-blue-500 outline-none font-bold" placeholder="国語">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 mb-1.5">範囲・ページ（例: 86～87）</label>
          <input type="text" id="ondoku-page" class="w-full p-2.5 border rounded-xl text-base focus:ring-1 focus:ring-blue-500 outline-none font-bold" placeholder="86～87">
        </div>
      </div>

      <!-- 算ド用の入力フォーム -->

  <!-- タップ用のメニュー選択カスタムモーダル (子ども画面をスッキリ保つため) -->
  <div id="custom-select-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-all duration-200">

  <!-- スマホでのタップや操作を邪魔しないカスタムダイアログ（alert/confirmの代替） -->
  <div id="custom-confirm-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4 transition-all duration-200">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 transform scale-100 transition-transform duration-200">
      <div class="flex items-center gap-3 mb-4">

          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <h3 class="font-bold text-lg text-slate-900" id="confirm-title">確認</h3>
      </div>
      <p class="text-sm text-slate-600 mb-6 font-medium leading-relaxed" id="confirm-message">処理を実行しますか？</p>
      <div class="flex justify-end gap-3">
        <button id="confirm-cancel-btn" class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold text-sm transition-colors">キャンセル</button>
        <button id="confirm-ok-btn" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-sm transition-colors shadow-md shadow-indigo-200">確定</button>
      </div>

  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyB-hHkL9jyoudu3bNyhidZIUCKlUaaXUX8", projectId: "electronic-board-app" };
    const boardId = "main";
    
    // 漢数字変換用
    const toKanji = (num) => {
        const kanji = ['〇','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','二十一','二十二','二十三','二十四','二十五','二十六','二十真','二十八','二十九','三十','三十一'];
        return kanji[parseInt(num)] || num;
    };

    // 縦書きの中で英数字、範囲記号、丸数字などが不自然に縦に割れないよう「縦中横（横書き）」にする自動フォーマッター
    const formatVerticalText = (text) => {
        if (!text) return "";
        // タグの混入を防ぐためのエスケープ
        let escaped = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");

        // A. 英数字、丸数字、キーキャップ数字（□囲み用）の置換
        // ※ 1⃣などのキーキャップ数字がフォントのズームに合わせて可変になるよう em 単位で指定。囲み内の文字サイズが縮まないよう 1em（等倍）にします。
        escaped = escaped.replace(/([0-9０-９]\ufe0f?\u20e3|[0-9]⃣|[０-９]⃣|[0-9a-zA-Z２-９ａ-ｚＡ-Ｚ.・:：\/\\-]+|[①②③④⑤⑥⑦⑧⑨⑩⑪⑫⑬⑭⑮⑯⑰⑱⑲⑳❶❷❸❹❺❻❼❽❾❿⓫⓬⓭⓮⓯⓰⓱⓲⓳⓴])/g, (match) => {
            // キーキャップ囲み数字文字の判定
            if (match.indexOf('\u20e3') !== -1 || match.indexOf('⃣') !== -1) {
                const num = match.charAt(0);
                const halfNum = num.replace(/[０-９]/g, (s) => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
                // 文字サイズ自体を周りと同じ（1em）に保ったまま、囲みの四角枠を等倍で美しく描画
                return `<span class="border border-slate-800 rounded-sm inline-flex items-center justify-center bg-slate-50 font-sans font-bold text-center" style="writing-mode: horizontal-tb; vertical-align: middle; width: 1.3em; height: 1.3em; font-size: 1em; line-height: 1; margin: 0 2px; display: inline-flex;">${halfNum}</span>`;
            } else {
                return `<span class="inline-block font-sans font-bold" style="writing-mode: horizontal-tb; text-orientation: initial; margin: 0 1px; vertical-align: middle;">${match}</span>`;
            }
        });

        // B. 先頭またはスペースに隣接する「が」「音」「算」「国」を検出し、美しい円（〇）で囲む (サイズを周りと等倍の 1em に調整)
        // ※「音　国語」の「国」を絶対に置換しないために、隣が完全にスペース(または行頭・行末)になっている独立した「が」「音」「算」「国」のみをキャッチ。
        escaped = escaped.replace(/(^|　| )(が|音|算|国)(?=($|　| ))/g, (match, p1, p2) => {
            const roundedChar = `<span class="rounded-full border border-slate-700 inline-flex items-center justify-center bg-white shadow-sm font-bold text-center" style="writing-mode: horizontal-tb; vertical-align: middle; width: 1.35em; height: 1.35em; font-size: 1em; line-height: 1; margin: 3px 0; color: #1e293b; display: inline-flex; padding: 1px;">${p2}</span>`;
            return p1 + roundedChar;
        });

        return escaped;
    };

    let currentSize = parseInt(localStorage.getItem('fontSize')) || 20;
    const applyFontSize = (size) => {
        document.getElementById('board-main').style.fontSize = size + 'px';
        const headings = document.querySelectorAll('.board-heading');
        headings.forEach(h => h.style.fontSize = (size * 1.5) + 'px');
        const dispDate = document.getElementById('disp-date');
        if(dispDate) dispDate.style.fontSize = (size * 1.4) + 'px';
        document.getElementById('editor-title').style.fontSize = (size * 2) + 'px';
        document.getElementById('editor-content').style.fontSize = size + 'px';
        const editHeadings = document.querySelectorAll('#editor-content h3');
        editHeadings.forEach(h => h.style.fontSize = (size * 1.2) + 'px');
    };
    applyFontSize(currentSize);

    const changeFontSize = (delta) => {
      currentSize = Math.max(12, Math.min(60, currentSize + delta));
      applyFontSize(currentSize);
      localStorage.setItem('fontSize', currentSize);
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    // カスタムダイアログの実装
    const showConfirm = (title, message, onConfirm) => {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        
        const modal = document.getElementById('custom-confirm-modal');
        const cancelBtn = document.getElementById('confirm-cancel-btn');
        const okBtn = document.getElementById('confirm-ok-btn');
        
        cancelBtn.classList.remove('hidden');
        modal.classList.remove('hidden');
        
        const cleanup = () => {
            modal.classList.add('hidden');
            cancelBtn.onclick = null;
            okBtn.onclick = null;
        };
        
        cancelBtn.onclick = () => { cleanup(); };
        okBtn.onclick = () => { onConfirm(); cleanup(); };
    };

    const showAlert = (title, message) => {
        document.getElementById('confirm-title').textContent = title;
        document.getElementById('confirm-message').textContent = message;
        
        const modal = document.getElementById('custom-confirm-modal');
        const cancelBtn = document.getElementById('confirm-cancel-btn');
        const okBtn = document.getElementById('confirm-ok-btn');
        
        cancelBtn.classList.add('hidden');
        modal.classList.remove('hidden');
        
        okBtn.onclick = () => {
            modal.classList.add('hidden');
            cancelBtn.classList.remove('hidden');
            okBtn.onclick = null;
        };
    };

    // 選択肢モーダル
    const showCustomSelectModal = (title, options) => {
        document.getElementById('select-modal-title').textContent = title;
        const container = document.getElementById('select-modal-options');
        container.innerHTML = "";
        
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "w-full py-3 px-4 bg-slate-50 hover:bg-slate-100 text-slate-800 font-bold rounded-xl text-left border border-slate-100 transition-colors flex items-center justify-between";
            btn.innerHTML = `<span>${opt.label}</span>
                             <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>`;
            btn.onclick = () => {
                closeSelectModal();
                opt.action();
            };
            container.appendChild(btn);
        });
        document.getElementById('custom-select-modal').classList.remove('hidden');
    };
    const closeSelectModal = () => {
        document.getElementById('custom-select-modal').classList.add('hidden');
    };

    // 宿題の追加メニュー表示 (表示黒板の「宿」＋ボタン用)
    const showAddHomeworkMenu = () => {
        showCustomSelectModal("宿題の追加方法", [
            { label: "✏️ 普通の項目を追加", action: () => addItem('homework') },
            { label: "🔥 「がんばり」を追加", action: () => openHomeworkModal('ganbari') },
            { label: "📖 「音読」を追加", action: () => openHomeworkModal('ondoku') },
            { label: "📐 「算ド」を追加", action: () => openHomeworkModal('sandori') },
            { label: "📝 「国ド」を追加", action: () => openHomeworkModal('kokudori') }
        ]);
    };

    // 宿題テンプレートモーダル開閉
    let currentHwType = "ganbari";
    const openHomeworkModal = (type) => {
        currentHwType = type;
        const title = document.getElementById('hw-modal-title');
        
        const formGanbari = document.getElementById('hw-form-ganbari');
        const formOndoku = document.getElementById('hw-form-ondoku');
        const formSandori = document.getElementById('hw-form-sandori');
        const formKokudori = document.getElementById('hw-form-kokudori');
        
        // 全フォームを一旦非表示
        formGanbari.classList.add('hidden');
        formOndoku.classList.add('hidden');
        formSandori.classList.add('hidden');
        formKokudori.classList.add('hidden');
        
        // 入力フォームの初期化
        document.getElementById('ganbari-page').value = "1.5";
        document.getElementById('ganbari-content').value = "自学";
        document.getElementById('ondoku-subject').value = "国語";
        document.getElementById('ondoku-page').value = "86～87";
        document.getElementById('sandori-num').value = "1⃣";
        document.getElementById('kokudori-num').value = "1⃣";
        
        if (type === 'ganbari') {
            title.textContent = "🔥 がんばり の追加";
            formGanbari.classList.remove('hidden');
        } else if (type === 'ondoku') {
            title.textContent = "📖 音読 の追加";
            formOndoku.classList.remove('hidden');
        } else if (type === 'sandori') {
            title.textContent = "📐 算ド の追加";
            formSandori.classList.remove('hidden');
        } else if (type === 'kokudori') {
            title.textContent = "📝 国ド の追加";
            formKokudori.classList.remove('hidden');
        }
        document.getElementById('homework-template-modal').classList.remove('hidden');
    };

    const closeHomeworkModal = () => {
        document.getElementById('homework-template-modal').classList.add('hidden');
    };

    const setGanbariContent = (val) => { document.getElementById('ganbari-content').value = val; };
    const setOndokuSubject = (val) => { document.getElementById('ondoku-subject').value = val; };
    const setSandoriNum = (val) => { document.getElementById('sandori-num').value = val; };
    const setKokudoriNum = (val) => { document.getElementById('kokudori-num').value = val; };

    // 宿題の追加形式をユーザー指定の「算　ドリル　1⃣」「国　ドリル　1⃣」へ変更
    const submitHomeworkTemplate = () => {
        let resultText = "";
        if (currentHwType === 'ganbari') {
            const page = document.getElementById('ganbari-page').value.trim() || "1.5";
            const content = document.getElementById('ganbari-content').value.trim() || "自学";
            resultText = `が　${page}　${content}`;
        } else if (currentHwType === 'ondoku') {
            const subject = document.getElementById('ondoku-subject').value.trim() || "国語";
            const page = document.getElementById('ondoku-page').value.trim() || "86～87";
            resultText = `音　${subject}　${page}`;
        } else if (currentHwType === 'sandori') {
            const num = document.getElementById('sandori-num').value.trim() || "1⃣";
            resultText = `算　ドリル　${num}`;
        } else if (currentHwType === 'kokudori') {
            const num = document.getElementById('kokudori-num').value.trim() || "1⃣";
            resultText = `国　ドリル　${num}`;
        }
        
        db.collection("boards").doc(boardId).get().then(doc => {
            let data = doc.data() || {};
            let list = data.homework || [];
            list.push(resultText);
            db.collection("boards").doc(boardId).set({ homework: list }, { merge: true }).then(() => {
                closeHomeworkModal();
            });
        });
    };

    // 項目ドラッグ並び替え用の初期化ファンクション
    // 縦書き(横並び)と横書き(縦並び)で正確に動作するように direction を最適化し、スライドをなめらかに。
    const initSortableContainer = (containerId, field) => {
        const el = document.getElementById(containerId);
        if (!el) return;
        
        // 既存のSortableインスタンスがあれば破棄して再バインド
        if (el.sortableInstance) {
            el.sortableInstance.destroy();
        }

        const isVerticalCol = (field !== 'schedule'); // 連絡、宿題、持ち物は縦書き（要素は横に並ぶ）

        el.sortableInstance = Sortable.create(el, {
            animation: 250,
            ghostClass: 'bg-blue-50', // ドラッグした瞬間の移動先を青白く表示してわかりやすく
            dragClass: 'opacity-40',
            // グリップアイコン(点々マーク)の撤廃に伴い、テキストボックス自体を掴んでどこでもスライド並び替え可能に
            direction: isVerticalCol ? 'horizontal' : 'vertical', // 縦書きエリアは 'horizontal'、時間割は 'vertical'
            swapThreshold: 0.5, // 半分重なった時点でサクッと入れ替わり、間への滑り込みが劇的にスムーズに
            invertSwap: true,
            onEnd: (evt) => {
                const oldIdx = evt.oldIndex;
                const newIdx = evt.newIndex;
                if (oldIdx === newIdx || oldIdx === undefined || newIdx === undefined) return;

                db.collection("boards").doc(boardId).get().then(doc => {
                    const data = doc.data() || {};
                    const list = [...(data[field] || [])];
                    const [movedItem] = list.splice(oldIdx, 1);
                    list.splice(newIdx, 0, movedItem);

                    db.collection("boards").doc(boardId).set({ [field]: list }, { merge: true });
                });
            }
        });
    };

    const saveDate = () => {
        db.collection("boards").doc(boardId).set({
            month: document.getElementById('edit-month').value,
            day: document.getElementById('edit-day').value,
            week: document.getElementById('edit-week').value
        }, { merge: true });
    };

    const incrementDate = () => {
        const m = parseInt(document.getElementById('edit-month').value);
        const d = parseInt(document.getElementById('edit-day').value);
        const daysInMonth = [0,31,29,31,30,31,30,31,31,30,31,30,31];
        let nextD = d + 1;
        let nextM = m;
        if (nextD > daysInMonth[m]) { nextD = 1; nextM = (m % 12) + 1; }
        const weekList = ['日','月','火','水','木','金','土'];
        const currentWeekIdx = weekList.indexOf(document.getElementById('edit-week').value) || 0;
        const nextWeek = weekList[(currentWeekIdx + 1) % 7];
        db.collection("boards").doc(boardId).set({ month: nextM.toString(), day: nextD.toString(), week: nextWeek }, { merge: true });
    };

    // 日付を戻す（前日へ）処理
    const decrementDate = () => {
        const m = parseInt(document.getElementById('edit-month').value);
        const d = parseInt(document.getElementById('edit-day').value);
        const daysInMonth = [0,31,29,31,30,31,30,31,31,30,31,30,31];
        let prevD = d - 1;
        let prevM = m;
        if (prevD < 1) {
            prevM = m - 1;
            if (prevM < 1) prevM = 12;
            prevD = daysInMonth[prevM];
        }
        const weekList = ['日','月','火','水','木','金','土'];
        const currentWeekIdx = weekList.indexOf(document.getElementById('edit-week').value) || 0;
        const prevWeek = weekList[(currentWeekIdx + 6) % 7];
        db.collection("boards").doc(boardId).set({ month: prevM.toString(), day: prevD.toString(), week: prevWeek }, { merge: true });
    };

    const addItem = (field) => {
        db.collection("boards").doc(boardId).get().then(doc => {
            let data = doc.data() || {};
            let list = data[field] || [];
            list.push("");
            db.collection("boards").doc(boardId).set({ [field]: list }, { merge: true });
        });
    };

    const updateItem = (field, index, value) => {
        db.collection("boards").doc(boardId).get().then(doc => {
            let data = doc.data() || {};
            let list = data[field] || [];
            list[index] = value;
            db.collection("boards").doc(boardId).set({ [field]: list }, { merge: true });
        });
    };

    const deleteItem = (field, idx) => {
        db.collection("boards").doc(boardId).get().then(doc => {
            let list = doc.data()[field] || [];
            list.splice(idx, 1);
            db.collection("boards").doc(boardId).set({ [field]: list }, { merge: true });
        });
    };

    // 週間テンプレート操作用関数
    const updateTemplateItem = (day, index, value) => {
        db.collection("boards").doc(boardId).get().then(doc => {
            let data = doc.data() || {};
            let templates = data.templates || {};
            let list = templates[day] || [];
            list[index] = value;
            templates[day] = list;
            db.collection("boards").doc(boardId).set({ templates: templates }, { merge: true });
        });
    };

    const addTemplateItem = (day) => {
        db.collection("boards").doc(boardId).get().then(doc => {
            let data = doc.data() || {};
            let templates = data.templates || {};
            let list = templates[day] || [];
            list.push("");
            templates[day] = list;
            db.collection("boards").doc(boardId).set({ templates: templates }, { merge: true });
        });
    };

    const deleteTemplateItem = (day, idx) => {
        db.collection("boards").doc(boardId).get().then(doc => {
            let data = doc.data() || {};
            let templates = data.templates || {};
            let list = templates[day] || [];
            list.splice(idx, 1);
            templates[day] = list;
            db.collection("boards").doc(boardId).set({ templates: templates }, { merge: true });
        });
    };

    // 曜日の時間割テンプレートを今日の時間割に反映する処理
    const applyTemplateToCurrentSchedule = () => {
        db.collection("boards").doc(boardId).get().then(doc => {
            const data = doc.data() || {};
            const currentWeek = data.week || "月";
            const templates = data.templates || {};
            const templateList = templates[currentWeek];
            
            if (!templateList || templateList.length === 0 || templateList.every(v => v === "")) {
                showAlert(
                    "テンプレート未設定", 
                    `「${currentWeek}曜日」のテンプレート時間割がまだ設定されていません。編集画面の「週間テンプレート」タブで登録してください。`
                );
                return;
            }
            
            showConfirm(
                "テンプレートの適用", 
                `現在の本日の時間割を、「${currentWeek}曜日」の登録済みテンプレート（${templateList.filter(Boolean).join(', ')} など）で上書きしますか？`,
                () => {
                    db.collection("boards").doc(boardId).set({ schedule: [...templateList] }, { merge: true });
                }
            );
        });
    };

    const renderEditable = (containerId, field) => {
        const cont = document.getElementById(containerId);
        db.collection("boards").doc(boardId).onSnapshot(doc => {
            const data = doc.data() || {};
            const items = data[field] || [];
            cont.innerHTML = "";
            items.forEach((val, idx) => {
                const div = document.createElement('div');
                
                // 点々マーク（ドラッググリップ）撤廃による、完璧な余白の最適化
                if (field === 'schedule') {
                    div.className = "editable group relative p-1.5 w-full text-left bg-white rounded-lg hover:shadow-sm border border-transparent hover:border-slate-100 flex items-center justify-between";
                } else {
                    div.className = "editable group relative p-1.5 text-left inline-block bg-white rounded-lg hover:shadow-sm border border-transparent hover:border-slate-100";
                }
                
                // テキストを表示するエリア
                const textSpan = document.createElement('span');
                textSpan.className = "block w-full pointer-events-none"; // テキスト領域でのカーソル干渉防止
                let prefix = (field === 'notice') ? '※' : (field === 'items') ? '・' : '';
                let text = (field === 'schedule') ? (idx + 1) + "." + val : prefix + val;
                
                // 縦書きの場合のみ、丸囲みやキーキャップ四角囲み、縦中横（横書き）処理を施す
                if (field !== 'schedule') {
                    textSpan.innerHTML = formatVerticalText(text);
                } else {
                    textSpan.textContent = text;
                }
                div.appendChild(textSpan);

                // ✖ ボタン (削除) ：時間割（schedule）は削除を禁止
                if (field !== 'schedule') {
                    const delBtn = document.createElement('button');
                    // 誤操作防止のため、クリックをしっかりキャッチできるサイズに設計
                    delBtn.className = "absolute bottom-1.5 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-50 active:opacity-100 text-slate-400 hover:text-red-600 p-1 rounded-full hover:bg-slate-100 transition-all cursor-pointer flex items-center justify-center z-20";
                    delBtn.title = "この項目を削除";
                    delBtn.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    `;
                    
                    delBtn.onclick = (e) => {
                        e.stopPropagation(); // ドラッグや親クリックのイベント衝突防止
                        showConfirm(
                            "項目の削除", 
                            `この項目「${val || '（空欄）'}」を黒板から消しますか？`,
                            () => {
                                deleteItem(field, idx);
                            }
                        );
                    };
                    div.appendChild(delBtn);
                }

                // 削除・ドラッグ動作を邪魔せず、軽くタップした場合はインライン編集を起動
                div.onclick = (e) => {
                    if (e.target.closest('button')) return;
                    
                    const input = document.createElement('input');
                    input.className = "edit-input text-slate-800 font-bold bg-white";
                    input.value = val;
                    input.onblur = () => { updateItem(field, idx, input.value); input.replaceWith(div); };
                    input.onkeydown = (e) => { if(e.key === 'Enter') input.blur(); };
                    div.replaceWith(input);
                    input.focus();
                };
                
                cont.appendChild(div);
            });

            // コンテナが再レンダリングされるたびに、SortableJSをバインドし直してドラッグを有効化
            initSortableContainer(containerId, field);
        });
    };

    const renderEditor = (containerId, field) => {
        const cont = document.querySelector(`#list-${containerId} .list-container`);
        db.collection("boards").doc(boardId).onSnapshot(doc => {
            const data = doc.data() || {};
            cont.innerHTML = "";
            (data[field] || []).forEach((val, idx) => {
                const div = document.createElement('div');
                div.className = "flex gap-2 items-center";
                let label = (field === 'schedule') ? (idx + 1) + "." : ((field === 'notice') ? '※' : '・');
                div.innerHTML = `<span class="text-gray-500 font-bold w-10 text-right">${label}</span>
                                 <input type="text" value="${val}" class="w-full p-2.5 border rounded-lg text-left text-base" onblur="updateItem('${field}', ${idx}, this.value)" onkeydown="if(event.key === 'Enter') this.blur()">
                                 <button type="button" class="p-2.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl transition-colors flex items-center justify-center" onclick="deleteItem('${field}', ${idx})">
                                     <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                 </button>`;
                cont.appendChild(div);
            });
        });
    };

    // 編集モード内のタブ切替
    let activeEditorTab = 'schedule';
    const switchEditorTab = (tabName) => {
        activeEditorTab = tabName;
        document.querySelectorAll('.editor-tab').forEach(btn => {
            btn.className = "editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm text-slate-600 hover:text-slate-800 transition-all";
        });
        
        const activeBtn = document.getElementById(`tab-${tabName}`);
        if(tabName === 'weekly') {
            activeBtn.className = "editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-sm transition-all";
        } else {
            activeBtn.className = "editor-tab flex-1 py-2.5 px-4 text-center rounded-xl font-bold text-sm bg-blue-600 text-white shadow-sm transition-all";
        }

        ['schedule', 'homework', 'items', 'notice', 'weekly'].forEach(p => {
            document.getElementById(`edit-pane-${p}`).classList.add('hidden');
        });
        document.getElementById(`edit-pane-${tabName}`).classList.remove('hidden');
        
        if(tabName === 'weekly') {
            // 週間テンプレートのデータ読み込み
            db.collection("boards").doc(boardId).get().then(doc => {
                renderWeeklyTemplateListFromData(doc.data() || {});
            });
        }
    };

    // 週間テンプレート内の曜日切り替え
    let activeTemplateDay = '月';
    const switchTemplateDay = (day) => {
        activeTemplateDay = day;
        document.querySelectorAll('.temp-day-btn').forEach(btn => {
            btn.className = "temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all";
        });
        document.getElementById(`temp-day-${day}`).className = "temp-day-btn flex-1 min-w-[48px] py-2 text-center rounded-xl font-bold text-sm bg-indigo-600 text-white shadow-sm transition-all";
        
        db.collection("boards").doc(boardId).get().then(doc => {
            renderWeeklyTemplateListFromData(doc.data() || {});
        });
    };

    // 週間テンプレート描画
    const renderWeeklyTemplateListFromData = (data) => {
        const cont = document.getElementById('weekly-template-container');
        if (!cont) return;
        const templates = data.templates || {};
        const list = templates[activeTemplateDay] || [];
        cont.innerHTML = "";
        
        if (list.length === 0) {
            cont.innerHTML = `<div class="text-center py-8 text-slate-400 text-sm bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">
                                「${activeTemplateDay}曜日」の時間割テンプレートは未登録です。<br>下のボタンから時間割の枠を追加してください。
                              </div>`;
            return;
        }

        list.forEach((val, idx) => {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center";
            div.innerHTML = `
                <span class="text-slate-500 font-bold w-10 text-right">${idx + 1}.</span>
                <input type="text" value="${val}" class="w-full p-2.5 border rounded-lg text-left text-base focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 outline-none" onblur="updateTemplateItem('${activeTemplateDay}', ${idx}, this.value)" onkeydown="if(event.key === 'Enter') this.blur()">
                <button type="button" class="p-2.5 bg-red-50 text-red-600 hover:bg-red-100 rounded-xl transition-colors flex items-center justify-center" onclick="deleteTemplateItemAction(${idx})">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
            `;
            cont.appendChild(div);
        });
    };

    const addTemplateItemAction = () => {
        addTemplateItem(activeTemplateDay);
        setTimeout(() => {
            db.collection("boards").doc(boardId).get().then(doc => {
                renderWeeklyTemplateListFromData(doc.data() || {});
            });
        }, 150);
    };

    const deleteTemplateItemAction = (idx) => {
        deleteTemplateItem(activeTemplateDay, idx);
        setTimeout(() => {
            db.collection("boards").doc(boardId).get().then(doc => {
                renderWeeklyTemplateListFromData(doc.data() || {});
            });
        }, 150);
    };

    ['notice', 'homework', 'items', 'schedule'].forEach(f => {
        renderEditable('disp-' + f, f);
        renderEditor(f, f);
    });

    document.getElementById('mode-toggle').onclick = (e) => {
        document.getElementById('view-editor').classList.toggle('hidden');
        document.getElementById('view-display').classList.toggle('hidden');
        e.target.textContent = document.getElementById('view-editor').classList.contains('hidden') ? "編集モード" : "表示に戻る";
    };

    db.collection("boards").doc(boardId).onSnapshot(doc => {
        const d = doc.data() || {};
        const monthK = toKanji(d.month || "");
        const dayK = toKanji(d.day || "");
        const weekStr = d.week ? `︵${d.week}︶` : "";
        document.getElementById('disp-date').textContent = `${monthK}月${dayK}日${weekStr}`;
        document.getElementById('edit-month').value = d.month || "";
        document.getElementById('edit-day').value = d.day || "";
        document.getElementById('edit-week').value = d.week || "";
        
        // 曜日更新時、適用クイックボタンの title も更新
        const quickBtn = document.getElementById('quick-template-btn');
        if (quickBtn) {
            quickBtn.title = `${d.week || '月'}曜日の時間割テンプレートを適用`;
        }
        
        const editorBtnLabel = document.getElementById('editor-template-btn-label');
        if (editorBtnLabel) {
            editorBtnLabel.textContent = `「${d.week || '月'}」から読込`;
        }

        // 現在週間タブが開いていれば再レンダリング
        if (activeEditorTab === 'weekly') {
            renderWeeklyTemplateListFromData(d);
        }
    });
  </script>
</body>
</html>
